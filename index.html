<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#EDF8FC" />
  <title>Bioniq — проверка доступности сдачи крови в вашем городе</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #EDF8FC;
      box-sizing: border-box;
      padding: 0;
    }
    .page-header {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 8px;
      box-sizing: border-box;
    }
    .page-header a { display: inline-block; line-height: 0; }
    .page-header img { height: 26px; width: auto; display: block; }
    .page-main {
      display: flex;
      justify-content: center;
      padding: 8px 12px 32px;
      box-sizing: border-box;
    }
    @media (max-width: 420px) {
      .page-header { padding: 18px 14px 6px; }
      .page-header img { height: 22px; }
      .page-main { padding: 6px 10px 24px; }
    }
  </style>
</head>
<body>
<header class="page-header">
  <a href="https://bioniq.ru/" target="_blank" rel="noopener" aria-label="Bioniq — на главную">
    <img src="bioniq-logo-blue.svg" alt="Bioniq" />
  </a>
</header>
<main class="page-main">

<div id="bioniq-city-widget">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');
    #bioniq-city-widget {
      --bg: #EDF8FC;
      --ink: #05131A;
      --muted: rgba(5, 19, 26, 0.6);
      --line: #D5EAF4;
      --accent: #1098D4;
      --accent-light: #63BCE3;
      --accent-soft: #EDF8FC;
      --error: #d10714;
      --error-soft: #FDEDEE;
      --card: #FFFFFF;
      --radius: 18px;
      box-sizing: border-box;
      font-family: "Montserrat", Arial, Helvetica, sans-serif;
      color: var(--ink);
      max-width: 520px;
      margin: 0 auto;
      padding: 4px;
      -webkit-font-smoothing: antialiased;
    }
    #bioniq-city-widget * { box-sizing: border-box; }
    #bioniq-city-widget .wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px 24px 26px;
    }
    #bioniq-city-widget h2 {
      font-size: 22px;
      line-height: 1.25;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 20px;
      letter-spacing: -0.01em;
    }
    #bioniq-city-widget .field { position: relative; }
    #bioniq-city-widget input {
      width: 100%;
      font-size: 16px;
      padding: 15px 16px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      outline: none;
      color: var(--ink);
      background: var(--bg);
      transition: border-color .15s, background .15s;
      font-family: inherit;
    }
    #bioniq-city-widget input::placeholder { color: rgba(5, 19, 26, 0.35); }
    #bioniq-city-widget input:focus {
      border-color: var(--accent);
      background: #fff;
    }
    #bioniq-city-widget .suggest {
      position: absolute;
      left: 0; right: 0; top: calc(100% + 6px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(16, 152, 212, 0.14);
      max-height: 232px;
      overflow-y: auto;
      z-index: 20;
      display: none;
    }
    #bioniq-city-widget .suggest.open { display: block; }
    #bioniq-city-widget .suggest button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--ink);
      cursor: pointer;
      font-family: inherit;
      border-bottom: 1px solid #EDF8FC;
    }
    #bioniq-city-widget .suggest button:last-child { border-bottom: none; }
    #bioniq-city-widget .suggest button:hover,
    #bioniq-city-widget .suggest button.active { background: var(--accent-soft); }
    #bioniq-city-widget .suggest mark {
      background: none;
      color: var(--ink);
      font-weight: 600;
    }
    #bioniq-city-widget .check {
      width: 100%;
      margin-top: 12px;
      font-size: 16px;
      font-weight: 600;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #1098D4 0%, #63BCE3 100%);
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s, transform .05s;
    }
    #bioniq-city-widget .check:hover { opacity: .92; }
    #bioniq-city-widget .check:active { transform: translateY(1px); }
    #bioniq-city-widget .result {
      margin-top: 18px;
      border-radius: 14px;
      padding: 20px;
      display: none;
      align-items: flex-start;
      gap: 14px;
      animation: pop .22s ease;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    #bioniq-city-widget .result.show { display: flex; }
    #bioniq-city-widget .result.yes { background: var(--accent-soft); }
    #bioniq-city-widget .result.no  { background: var(--error-soft); }
    #bioniq-city-widget .result.info { background: var(--accent-soft); }
    #bioniq-city-widget .icon {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    #bioniq-city-widget .result.yes .icon { background: var(--accent); }
    #bioniq-city-widget .result.no .icon  { background: var(--error); }
    #bioniq-city-widget .result.info .icon { background: var(--accent-light); }
    #bioniq-city-widget .icon svg { width: 22px; height: 22px; stroke: #fff; }
    #bioniq-city-widget .rtext strong {
      display: block;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    #bioniq-city-widget .rtext span {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    #bioniq-city-widget .foot {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(5, 19, 26, 0.4);
      text-align: center;
    }
    @media (max-width: 420px) {
      #bioniq-city-widget { padding: 0; }
      #bioniq-city-widget .wrap { padding: 22px 16px 20px; border-radius: 16px; }
      #bioniq-city-widget h2 { font-size: 19px; margin-bottom: 16px; }
      #bioniq-city-widget input { padding: 14px 14px; }
      #bioniq-city-widget .check { padding: 16px; }
      #bioniq-city-widget .suggest { max-height: 208px; }
      #bioniq-city-widget .suggest button { padding: 14px 16px; }
      #bioniq-city-widget .result { padding: 16px; gap: 12px; }
      #bioniq-city-widget .icon { width: 36px; height: 36px; }
      #bioniq-city-widget .icon svg { width: 20px; height: 20px; }
      #bioniq-city-widget .rtext strong { font-size: 16px; }
    }
  </style>

  <div class="wrap">
    <h2>Проверьте доступность сдачи крови в вашем городе</h2>

    <div class="field">
      <input id="bq-input" type="text" autocomplete="off" placeholder="Например, Казань" aria-label="Город" />
      <div id="bq-suggest" class="suggest" role="listbox"></div>
    </div>

    <button id="bq-check" class="check">Проверить</button>

    <div id="bq-result" class="result" role="status" aria-live="polite">

      <div class="rtext">
        <strong id="bq-title"></strong>
        <span id="bq-desc"></span>
      </div>
    </div>

    <p class="foot">Если города нет в списке, свяжитесь с нами.</p>
  </div>

    var norm = function(s){ return s.toLowerCase().replace(/ё/g,'е').replace(/[^а-я\- ]/g,'').trim(); };
    var index = Object.keys(DATA).map(function(c){ return { c: c, k: norm(c), labs: DATA[c] }; });

    var input = document.getElementById('bq-input');
    var box = document.getElementById('bq-suggest');
    var btn = document.getElementById('bq-check');
    var res = document.getElementById('bq-result');
    var icon = document.getElementById('bq-icon');
    var title = document.getElementById('bq-title');
    var desc = document.getElementById('bq-desc');
    var activeIdx = -1, current = [];

    var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    var CROSS = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
    var QUES  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg>';

    function esc(s){ return s.replace(/[&<>]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }

    function suggestions(q){
      var nq = norm(q);
      if(!nq) return [];
      var starts = [], contains = [];
      for(var i=0;i<index.length;i++){
        var p = index[i].k.indexOf(nq);
        if(p===0) starts.push(index[i]);
        else if(p>0) contains.push(index[i]);
      }
      return starts.concat(contains).slice(0,8);
    }

    function renderSuggest(){
      var q = input.value;
      current = suggestions(q);
      activeIdx = -1;
      if(!current.length){ box.classList.remove('open'); box.innerHTML=''; return; }
      var nq = norm(q);
      box.innerHTML = current.map(function(item){
        var idx = item.k.indexOf(nq);
        var disp = item.c;
        var html = esc(disp);
        if(idx>=0){
          html = esc(disp.slice(0,idx)) + '<mark>' + esc(disp.slice(idx, idx+nq.length)) + '</mark>' + esc(disp.slice(idx+nq.length));
        }
        return '<button type="button" data-city="'+esc(disp)+'">'+html+'</button>';
      }).join('');
      box.classList.add('open');
    }

    function showResult(type, t, d){
      res.className = 'result show ' + type;
      icon.innerHTML = type==='yes' ? CHECK : (type==='no' ? CROSS : QUES);
      title.textContent = t;
      desc.textContent = d;
    }

    function check(){
      box.classList.remove('open');
      var q = input.value.trim();
      if(!q){ showResult('info','Введите город','Напишите название города в поле выше.'); return; }
      var nq = norm(q);
      var exact = index.find(function(x){ return x.k === nq; });
      if(exact){
        showResult('yes','Да, лаборатория есть','В городе '+exact.c+' можно сдать анализы: '+exact.labs+'.');
        input.value = exact.c;
        return;
      }
      var near = suggestions(q);
      if(near.length){
        showResult('info','Уточните город','Возможно, вы имели в виду: '+near.slice(0,3).map(function(x){return x.c;}).join(', ')+'. Выберите город из подсказки.');
      } else {
        showResult('no','Пока не нашли','В этом городе партнёрская лаборатория не найдена. Проверьте написание или свяжитесь с нами.');
      }
    }

    input.addEventListener('input', function(){ res.classList.remove('show'); renderSuggest(); });
    input.addEventListener('keydown', function(e){
      if(!box.classList.contains('open')){ if(e.key==='Enter') check(); return; }
      var btns = box.querySelectorAll('button');
      if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,btns.length-1); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); }
      else if(e.key==='Enter'){
        e.preventDefault();
        if(activeIdx>=0 && btns[activeIdx]){ pick(btns[activeIdx].dataset.city); }
        else check();
        return;
      } else if(e.key==='Escape'){ box.classList.remove('open'); return; }
      btns.forEach(function(b,i){ b.classList.toggle('active', i===activeIdx); });
      if(btns[activeIdx]) btns[activeIdx].scrollIntoView({block:'nearest'});
    });

    function pick(city){
      input.value = city;
      box.classList.remove('open');
      check();
    }

    box.addEventListener('click', function(e){
      var b = e.target.closest('button');
      if(b) pick(b.dataset.city);
    });

    btn.addEventListener('click', check);

    document.addEventListener('click', function(e){
      if(!e.target.closest('#bioniq-city-widget .field')) box.classList.remove('open');
    });
  })();
  </script>
</div>
